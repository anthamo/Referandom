<!DOCTYPE html>
<!-- SPDX-License-Identifier: MIT -->
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referandom</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="bg-decor"></div>
    <div id="app">
        <div id="button-container">
            <button class="cat-btn" data-cat="Carrière">Ta carrière</button>
            <button class="cat-btn" data-cat="Équilibre pro/perso">Ton équilibre pro/perso</button>
            <button class="cat-btn" data-cat="Ton manager">Ton référent</button>
            <button id="boutonChance">J'ai de la chance</button>
        </div>

        <div id="question-container">
            <span id="category-badge"></span>
            <p id="question"></p>
            <div class="pass-row">
                <button id="passer" type="button">
                    <svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="13 19 22 12 13 5"></polygon><polygon points="2 19 11 12 2 5"></polygon></svg>
                    <span>Passer</span>
                </button>
                <span id="pass-hint"></span>
            </div>
        </div>

        <footer id="credits">
            <a class="gh" href="https://github.com/anthamo/Referandom" target="_blank" rel="noopener" aria-label="Voir le code sur le GitHub d'Anthamo">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path></svg>
                <span>par anthamo</span>
            </a>
            <span class="sep" aria-hidden="true">•</span>
            <a href="https://github.com/anthamo/Referandom/issues" target="_blank" rel="noopener">Proposer une question</a>
            <button id="theme-toggle" type="button" aria-label="Changer de thème" title="Changer de thème">
                <svg class="ico-moon" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="ico-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"></circle><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"></path></svg>
            </button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
